name: Ingest blog content

# Populates the RAG corpus (documents table) with the blog sources in
# lib/blog-sources.ts, so Mary's "Further Reading" rung has content to surface.
#
# Runs weekly to stay fresh as the blogs publish, and can be run on demand from
# the Actions tab ("Run workflow") — use that for the first population.
#
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL     — the same production value as your Vercel project
#   OPENAI_API_KEY   — used for embeddings

on:
  schedule:
    - cron: '0 8 * * 1' # Mondays, 08:00 UTC
  workflow_dispatch:
    inputs:
      args:
        description: 'Optional ingest-blog args (e.g. "eminence" for one source, or "--max=20")'
        required: false
        default: ''

# Never let two ingests overlap (they write the same table).
concurrency:
  group: ingest-blog
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ingest blog sources into the RAG corpus
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Passed via env (not interpolated into the command) to avoid shell injection.
          ARGS: ${{ inputs.args }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Missing DATABASE_URL or OPENAI_API_KEY repository secret."
            exit 1
          fi
          bun run ingest-blog $ARGS
